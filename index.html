<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrowMap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    /* surfaces */
    --paper:#f3efe4; --paper-2:#ebe5d5; --card:#fffdf8;
    /* ink & text */
    --ink:#1b2a20; --soft:#697a6c;
    /* brand */
    --leaf:#2c6a45; --leaf-2:#357f53; --leaf-bright:#4faf72; --gold:#b8801f;
    /* hairlines */
    --line:#e7e2d3; --line2:#dcd6c4;
    /* status: in-season / done */
    --now-bg:#e2f1e5; --now-fg:#1e7a41;
    /* status: last call */
    --last-bg:#fbeecf; --last-fg:#9a6a17;
    /* status: upcoming */
    --soon-bg:#e2eef2; --soon-fg:#2b6576;
    /* status: passed / closed */
    --closed-bg:#ece9df; --closed-fg:#8a8576;
    /* clay accent — bad neighbours (matches JS legend literals #b0552a/#f7ded1) */
    --clay:#b0552a; --clay-bg:#f7ded1;
    /* elevation */
    --sh-sm:0 1px 2px rgba(27,42,32,.05),0 2px 6px rgba(27,42,32,.05);
    --sh-md:0 2px 5px rgba(27,42,32,.05),0 12px 26px rgba(27,42,32,.09);
    --sh-lg:0 14px 44px rgba(27,42,32,.17);
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{
    color:var(--ink);font-family:'Inter',system-ui,sans-serif;font-size:15px;line-height:1.5;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;min-height:100vh;
    background-color:var(--paper);
    background-image:
      radial-gradient(120% 85% at 50% -12%, rgba(79,175,114,.11), transparent 58%),
      radial-gradient(90% 55% at 108% -4%, rgba(184,128,31,.07), transparent 55%),
      linear-gradient(rgba(44,106,69,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(44,106,69,.035) 1px, transparent 1px),
      linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
    background-size:auto,auto,32px 32px,32px 32px,auto;
    background-attachment:fixed;
  }
  .app{max-width:520px;margin:0 auto;padding:0 18px 122px;min-height:100vh}
  button{font-family:inherit;cursor:pointer}
  ::selection{background:var(--now-bg);color:var(--leaf)}

  header{padding:26px 6px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .mark{display:block;line-height:0;filter:drop-shadow(0 2px 3px rgba(27,42,32,.14))}
  .brand h1{font-family:'Fraunces',serif;font-size:27px;font-weight:600;letter-spacing:-.025em;line-height:1}
  .brand .m{color:var(--leaf-bright)}
  .brand .v{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;
    border:1px solid rgba(184,128,31,.35);background:rgba(184,128,31,.09);padding:3px 7px;border-radius:6px;align-self:flex-start;margin-top:2px}
  .season-mini{font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:var(--soft);text-align:right;line-height:1.55;letter-spacing:.02em}

  /* tabs — floating frosted bar */
  nav{position:fixed;left:50%;transform:translateX(-50%);bottom:max(14px,env(safe-area-inset-bottom));
    width:min(492px,calc(100% - 28px));display:flex;z-index:50;padding:8px 6px;
    background:rgba(255,253,248,.82);backdrop-filter:blur(18px) saturate(1.5);-webkit-backdrop-filter:blur(18px) saturate(1.5);
    border:1px solid var(--line2);border-radius:22px;box-shadow:var(--sh-lg)}
  nav button{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;
    font-size:10px;font-weight:600;color:var(--soft);font-family:'IBM Plex Mono',monospace;letter-spacing:.05em;text-transform:uppercase;transition:color .2s}
  nav button .ic{display:flex;align-items:center;justify-content:center;width:52px;height:30px;border-radius:11px;font-size:17px;
    transition:background .22s,transform .22s}
  nav button.on{color:var(--leaf)}
  nav button.on .ic{background:var(--now-bg);transform:translateY(-1px)}
  nav button:active .ic{transform:scale(.9)}

  /* setup card */
  .setup{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px;margin-top:10px;box-shadow:var(--sh-sm)}
  .lab{font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;color:var(--leaf);margin-bottom:12px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line2);background:var(--paper);border-radius:100px;padding:9px 15px;font-size:13.5px;font-weight:500;color:var(--ink);transition:.18s;box-shadow:var(--sh-sm)}
  .chip:hover{border-color:var(--leaf-bright);color:var(--leaf)}
  .chip.on{background:linear-gradient(180deg,var(--leaf-2),var(--leaf));border-color:var(--leaf);color:#fff;box-shadow:0 2px 9px rgba(44,106,69,.3)}
  .chip.on:hover{color:#fff}
  .custom{margin-top:14px;display:flex;align-items:center;gap:10px;font-size:13.5px;color:var(--soft);flex-wrap:wrap}
  .custom input{font:inherit;font-size:14px;border:1px solid var(--line2);border-radius:10px;padding:9px 11px;background:var(--paper);color:var(--ink);transition:.16s}
  .custom input:focus{outline:none;border-color:var(--leaf-bright);box-shadow:0 0 0 3px var(--now-bg)}

  .group{margin-top:24px}
  .group-h{display:flex;align-items:center;gap:10px;margin:0 6px 12px}
  .group-h .dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 0 4px rgba(27,42,32,.04)}
  .group-h h2{font-size:11.5px;font-weight:600;text-transform:uppercase;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em;color:var(--ink)}
  .group-h .ct{font-size:11px;color:var(--soft);font-family:'IBM Plex Mono',monospace;margin-left:auto;
    background:var(--card);border:1px solid var(--line);border-radius:100px;padding:2px 9px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;
    position:relative;overflow:hidden;box-shadow:var(--sh-sm);transition:transform .18s,box-shadow .18s}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--closed-fg)}
  .card.active::before,.card.now::before{background:linear-gradient(180deg,var(--leaf-bright),var(--now-fg))}
  .card.last_call::before{background:linear-gradient(180deg,#e2b653,var(--last-fg))}
  .card.upcoming::before{background:linear-gradient(180deg,#4f97ab,var(--soon-fg))}
  .card.passed{opacity:.68}
  .card.done{opacity:.9}
  .card.done::before{background:linear-gradient(180deg,var(--leaf-bright),var(--now-fg))}
  .card.active:hover,.card.last_call:hover{transform:translateY(-2px);box-shadow:var(--sh-md)}
  .row1{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .pname{font-family:'Fraunces',serif;font-size:19px;font-weight:600;line-height:1.15;letter-spacing:-.012em}
  .pname.link{text-decoration:none;color:inherit;border-bottom:1.5px dotted var(--line2);transition:border-color .18s,color .18s}
  .pname.link:hover{color:var(--leaf);border-color:var(--leaf-bright)}
  .pmeta{font-size:12px;color:var(--soft);margin-top:3px;text-transform:capitalize;letter-spacing:.01em}
  .status{flex-shrink:0;font-size:10.5px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.02em;padding:6px 11px;border-radius:100px;white-space:nowrap;border:1px solid transparent}
  .status.active{background:var(--now-bg);color:var(--now-fg);border-color:rgba(30,122,65,.18)}
  .status.last_call{background:var(--last-bg);color:var(--last-fg);border-color:rgba(154,106,23,.2)}
  .status.upcoming{background:var(--soon-bg);color:var(--soon-fg);border-color:rgba(43,101,118,.18)}
  .status.passed,.status.skipped{background:var(--closed-bg);color:var(--closed-fg);border-color:rgba(138,133,118,.2)}
  .status.done{background:var(--now-bg);color:var(--now-fg);border-color:rgba(30,122,65,.18)}
  .action{margin-top:12px;font-size:15px;font-weight:600}
  .action .win{font-weight:400;color:var(--soft);font-size:13px}
  .btns{display:flex;gap:9px;margin-top:14px}
  .btn{flex:1;border-radius:11px;padding:11px 0;font-size:14px;font-weight:600;border:1px solid var(--line2);background:var(--paper);color:var(--ink);transition:.16s;box-shadow:var(--sh-sm)}
  .btn:hover{border-color:var(--leaf-bright);color:var(--leaf)}
  .btn:active{transform:translateY(1px)}
  .btn.log{background:linear-gradient(180deg,var(--leaf-2),var(--leaf));border-color:var(--leaf);color:#fff;box-shadow:0 2px 11px rgba(44,106,69,.32)}
  .btn.log:hover{color:#fff;filter:brightness(1.06)}
  .undo{margin-top:12px;background:none;border:none;font-size:12.5px;color:var(--soft);text-decoration:underline;text-underline-offset:2px;padding:0;transition:color .16s}
  .undo:hover{color:var(--leaf)}

  .empty{background:var(--card);border:1px dashed var(--line2);border-radius:var(--r);padding:34px 22px;text-align:center;color:var(--soft);font-size:14.5px;margin-top:16px;box-shadow:var(--sh-sm)}
  .empty b{color:var(--ink);font-family:'Fraunces',serif;font-weight:600;font-size:17px;display:inline-block;margin-bottom:4px}
  .empty .go{display:inline-block;margin-top:16px;background:linear-gradient(180deg,var(--leaf-2),var(--leaf));color:#fff;border:none;border-radius:100px;padding:11px 22px;font-size:14px;font-weight:600;box-shadow:0 3px 13px rgba(44,106,69,.32);transition:.16s}
  .empty .go:hover{filter:brightness(1.06);transform:translateY(-1px)}

  /* plants tab */
  .addbtn{flex-shrink:0;border-radius:100px;border:1px solid var(--line2);background:var(--paper);color:var(--leaf);font-size:12.5px;font-weight:600;padding:8px 14px;transition:.16s;box-shadow:var(--sh-sm)}
  .addbtn:hover{border-color:var(--leaf-bright)}
  .addbtn.in{background:linear-gradient(180deg,var(--leaf-2),var(--leaf));border-color:var(--leaf);color:#fff;box-shadow:0 2px 9px rgba(44,106,69,.3)}

  /* detail */
  .back{background:none;border:none;color:var(--leaf);font-size:13px;font-weight:600;padding:12px 4px;font-family:'IBM Plex Mono',monospace;letter-spacing:.03em;transition:opacity .16s}
  .back:hover{opacity:.65}
  .detail{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px;margin-top:4px;box-shadow:var(--sh-md)}
  .detail h2{font-family:'Fraunces',serif;font-size:30px;font-weight:600;letter-spacing:-.02em;line-height:1.05}
  .latin{font-family:'Fraunces',serif;font-size:15px;color:var(--soft);font-style:italic;margin-top:4px}
  .facts{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
  .fact{font-size:11.5px;font-family:'IBM Plex Mono',monospace;background:var(--paper);border:1px solid var(--line2);border-radius:100px;padding:6px 12px;color:var(--soft);letter-spacing:.02em}
  .dsec{margin-top:22px}
  .dsec .lab{margin-bottom:9px}
  .dsec p,.dsec li{font-size:14.5px;color:var(--ink);line-height:1.55}
  .dsec ul{list-style:none}
  .dsec li{padding:9px 0 9px 24px;position:relative;border-top:1px solid var(--line)}
  .dsec li:first-child{border-top:none}
  .dsec li::before{content:"✦";position:absolute;left:2px;color:var(--leaf-bright)}
  .dsec li.warn::before{content:"✕";color:var(--clay)}
  .winrow{display:flex;justify-content:space-between;align-items:center;font-size:14px;padding:11px 0;border-top:1px solid var(--line)}
  .winrow:first-of-type{border-top:none}
  .winrow .st{font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;padding:3px 9px;border-radius:100px;background:var(--paper);margin-left:8px}
  .mates{font-size:14px;line-height:1.7}
  .mates .good{color:var(--now-fg);font-weight:600}
  .mates .bad{color:var(--clay);font-weight:600}

  .foot{margin-top:30px;font-size:11.5px;color:var(--soft);text-align:center;line-height:1.6;padding:0 12px;font-family:'IBM Plex Mono',monospace;letter-spacing:.02em}

  /* map */
  .mapctrls{display:flex;gap:16px;align-items:center;margin:6px 6px 16px;flex-wrap:wrap}
  .stepper{display:flex;align-items:center;gap:9px;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--soft)}
  .stepper button{width:28px;height:28px;border-radius:9px;border:1px solid var(--line2);background:var(--card);font-size:16px;line-height:1;color:var(--leaf);box-shadow:var(--sh-sm);transition:.16s}
  .stepper button:hover{border-color:var(--leaf-bright);background:var(--now-bg)}
  .stepper button:active{transform:translateY(1px)}
  .stepper span{min-width:14px;text-align:center;color:var(--ink);font-weight:600;font-size:13px}
  .gridwrap{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh-md)}
  .gridgrid{display:grid;gap:7px}
  .cell{aspect-ratio:1;border:1.5px solid var(--line2);border-radius:11px;background:var(--paper);display:flex;align-items:center;justify-content:center;font-size:10.5px;text-align:center;padding:3px;color:var(--ink);font-weight:600;line-height:1.15;font-family:'Inter',sans-serif;transition:.16s;box-shadow:var(--sh-sm)}
  .cell.filled{background:linear-gradient(180deg,#fff,var(--paper))}
  .cell:hover{border-color:var(--leaf-bright)}
  .cell.empty{color:var(--line2);font-size:20px;font-weight:400;background:transparent;border-style:dashed;box-shadow:none}
  .cell.empty:hover{color:var(--leaf-bright);background:var(--now-bg)}
  .cell.good{border-color:var(--now-fg);box-shadow:0 0 0 2px var(--now-bg) inset,var(--sh-sm)}
  .cell.bad{border-color:var(--clay);box-shadow:0 0 0 2px var(--clay-bg) inset,var(--sh-sm)}
  .legend{display:flex;gap:18px;margin-top:14px;font-size:11.5px;color:var(--soft);flex-wrap:wrap;font-family:'IBM Plex Mono',monospace;letter-spacing:.02em}
  .legend .sw{display:inline-block;width:11px;height:11px;border-radius:4px;margin-right:6px;vertical-align:-1px}
  .panel{margin-top:16px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-md)}
  .panel .lab{margin-bottom:11px}
  .panel .chips{display:flex;flex-wrap:wrap;gap:8px}
  .panel .rowbtns{display:flex;gap:9px;margin-top:4px}
  .panel .pname{font-family:'Fraunces',serif;font-size:18px;font-weight:600;margin-bottom:12px}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand"><span class="mark"><svg viewBox="0 0 32 32" width="30" height="30" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M16 30V14" stroke="#2c6a45" stroke-width="2.4" stroke-linecap="round"/><path d="M16 17.5C16 17.5 8.5 18 5.8 13.4C3.1 8.8 4.2 3.4 4.2 3.4C4.2 3.4 9.6 3.9 12.6 7.6C15.3 11 16 17.5 16 17.5Z" fill="#4faf72"/><path d="M15.7 14.5C15.7 14.5 22.4 15 25 11.2C27.6 7.4 27 2.6 27 2.6C27 2.6 21.8 3.7 19.3 6.9C16.9 10 15.7 14.5 15.7 14.5Z" fill="#2f7a4e"/></svg></span><h1>Grow<span class="m">Map</span></h1><span class="v">beta</span></div>
    <div class="season-mini" id="seasonMini"></div>
  </header>
  <div id="view"></div>
  <div class="foot" id="foot"></div>
</div>
<nav>
  <button data-tab="today"><span class="ic">☀</span>Today</button>
  <button data-tab="map"><span class="ic">▦</span>Map</button>
  <button data-tab="plants"><span class="ic">❀</span>Plants</button>
  <button data-tab="setup"><span class="ic">⚙</span>Setup</button>
</nav>

<script>
/* ================= ENGINE (tested: 27/27) ================= */
const DAY=86400000;
function addWeeks(base,wk){const d=new Date(base.getTime());d.setDate(d.getDate()+wk*7);return d}
function midnight(d){const x=new Date(d.getTime());x.setHours(0,0,0,0);return x}
function resolveFrost(month,day,today){const t=midnight(today);const y=t.getFullYear();
  const c=[y-1,y,y+1].map(yr=>midnight(new Date(yr,month,day)));
  c.sort((a,b)=>Math.abs(a-t)-Math.abs(b-t));return c[0]}
function windowsFor(p,frost){const w=[];
  if(p.sow_indoors)w.push({action:'Sow indoors',start:addWeeks(frost,p.sow_indoors[0]),end:addWeeks(frost,p.sow_indoors[1])});
  if(p.plant_out)w.push({action:p.sow_indoors?'Plant out':'Sow / plant outdoors',start:addWeeks(frost,p.plant_out[0]),end:addWeeks(frost,p.plant_out[1])});
  return w}
function classifyWindow(win,today,lastCallDays=10){const t=midnight(today);
  if(t<win.start)return'upcoming';if(t>win.end)return'passed';
  return Math.round((win.end-t)/DAY)<=lastCallDays?'last_call':'active'}
function tasksFor(plants,frost,today){const out=[];
  for(const p of plants)for(const win of windowsFor(p,frost)){
    out.push({id:p.id+'::'+win.action,plantId:p.id,plantName:p.name,action:win.action,start:win.start,end:win.end,status:classifyWindow(win,today)})}
  const rank={last_call:0,active:1,upcoming:2,passed:3};
  out.sort((a,b)=>rank[a.status]-rank[b.status]||a.start-b.start);return out}
function weeksFromFrost(frost,today){return Math.round((midnight(today)-frost)/(DAY*7))}

/* ================= VERIFIED PLANT DATA (5 pilots) ================= */
const PLANTS=[
 {id:'tomato',name:'Tomato',latin:'Solanum lycopersicum',cat:'vegetable',diff:'medium',sun:'full sun',water:'high water',frost:'no frost tolerance',
  sow_indoors:[-8,-6],plant_out:[1,3],harvest:'60–85 days',spacing:'50 cm',
  feed:'Switch to high-potassium feed once first flowers appear (every 14 days).',
  companions:['basil','carrot','chives','marigold'],antagonists:['potato','fennel','kale','corn'],
  tips:['Pinch out side shoots on vine types','Water consistently to prevent split fruit','Stake or string-support early, before plants flop'],
  mistakes:['Planting out before nights stay above 10°C','Overwatering seedlings (damping off)']},
 {id:'basil',name:'Basil',latin:'Ocimum basilicum',cat:'herb',diff:'easy',sun:'full sun',water:'medium water',frost:'no frost tolerance',
  sow_indoors:[-6,-2],plant_out:[2,4],harvest:'30–60 days',spacing:'20 cm',
  feed:'Light liquid feed every 3 weeks; overfeeding dulls flavour.',
  companions:['tomato','pepper'],antagonists:['sage'],
  tips:['Pinch growing tips to make it bush out','Harvest from the top, never strip lower leaves','Keep above 15°C at all times'],
  mistakes:['Cold windowsills kill it overnight','Letting it flower turns leaves bitter']},
 {id:'kale',name:'Kale',latin:'Brassica oleracea (Acephala)',cat:'vegetable',diff:'easy',sun:'full sun',water:'medium water',frost:'hardy',
  sow_indoors:[-6,-4],plant_out:[-2,6],harvest:'50–70 days',spacing:'40 cm',
  feed:'Nitrogen-rich feed monthly for leafy growth.',
  companions:['onion','beet','dill'],antagonists:['strawberry','tomato'],
  tips:['Frost sweetens the flavour — harvest into winter','Pick outer leaves, let the centre keep growing','Net against cabbage moths in summer'],
  mistakes:['Planting near strawberries','Summer heat makes leaves bitter — partial shade helps in warm zones']},
 {id:'strawberry',name:'Strawberry',latin:'Fragaria × ananassa',cat:'fruit / berry',diff:'easy',sun:'full sun',water:'medium water',frost:'hardy',
  sow_indoors:null,plant_out:[-2,4],harvest:'60–90 days',spacing:'30 cm',
  feed:'Feed every 2 weeks while fruiting; stop after harvest.',
  companions:['borage','lettuce','spinach','onion'],antagonists:['kale','tomato'],
  tips:['Keep the crown at soil level, never buried','Straw mulch under fruit keeps it clean and rot-free','Remove runners for bigger berries, keep them for more plants'],
  mistakes:['Burying the crown (rots)','Overhead watering during fruiting invites grey mould']},
 {id:'pea',name:'Sugar snap pea',latin:'Pisum sativum',cat:'vegetable',diff:'easy',sun:'full sun',water:'medium water',frost:'light frost ok',
  sow_indoors:null,plant_out:[-4,4],harvest:'55–70 days',spacing:'5 cm',
  feed:'Fixes its own nitrogen — skip high-N feeds entirely.',
  companions:['carrot','radish','cucumber'],antagonists:['onion','garlic'],
  tips:['Put netting or sticks up at sowing time, not later','Pick every 2 days to keep plants producing','Soak seeds overnight before sowing'],
  mistakes:['Sowing into cold, waterlogged soil (seeds rot)','Planting near the onion family']}
];
const PRESETS=[
 {key:'helsinki',label:'Helsinki',m:4,d:15},
 {key:'london',label:'London',m:3,d:20},
 {key:'newyork',label:'New York',m:3,d:15},
 {key:'melbourne',label:'Melbourne',m:8,d:5}
];

/* ================= STATE ================= */
const SKEY='growmap_beta_v1';
let S=load();
function load(){let s=null;try{const raw=localStorage.getItem(SKEY);if(raw)s=JSON.parse(raw)}catch(e){}
  if(!s)s={tab:'today',frostKey:'helsinki',frostCustom:null,garden:[],acts:{},detail:null};
  if(s.map==null)s.map={};
  if(s.mapRows==null)s.mapRows=4;
  if(s.mapCols==null)s.mapCols=4;
  if(s.picker===undefined)s.picker=null;
  if(s.cellMenu===undefined)s.cellMenu=null;
  return s}
function getPlant(id){return PLANTS.find(p=>p.id===id)}
function save(){try{localStorage.setItem(SKEY,JSON.stringify(S))}catch(e){}}
const TODAY=midnight(new Date());
function frost(){
  if(S.frostCustom){const c=new Date(S.frostCustom+'T00:00:00');return resolveFrost(c.getMonth(),c.getDate(),TODAY)}
  const p=PRESETS.find(p=>p.key===S.frostKey)||PRESETS[0];return resolveFrost(p.m,p.d,TODAY)}
function seasonKey(){return frost().getFullYear()} // acts reset each season
function fmt(dt){return dt.toLocaleDateString(undefined,{month:'short',day:'numeric'})}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

/* ================= RENDER ================= */
const view=document.getElementById('view');
function render(){
  save();
  const f=frost();const wk=weeksFromFrost(f,TODAY);
  const loc=S.frostCustom?'your frost date':(PRESETS.find(p=>p.key===S.frostKey)||{}).label;
  document.getElementById('seasonMini').innerHTML=
    (wk>=0?wk+' wks past frost':(-wk)+' wks to frost')+'<br>'+esc(loc)+' · '+fmt(f);
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on',b.dataset.tab===S.tab));
  document.getElementById('foot').innerHTML = S.tab==='today'
    ? 'GrowMap beta · 5 human-verified plants · timing computed live from your frost date.':'';
  if(S.detail)return renderDetail();
  if(S.tab==='today')renderToday(f);
  else if(S.tab==='map')renderMap(f);
  else if(S.tab==='plants')renderPlants(f);
  else renderSetup();
}

function actState(taskId){const a=S.acts[seasonKey()+':'+taskId];return a?a.s:null}
function setAct(taskId,s){if(s)S.acts[seasonKey()+':'+taskId]={s,d:Date.now()};else delete S.acts[seasonKey()+':'+taskId];render()}

function renderToday(f){
  const mine=PLANTS.filter(p=>S.garden.includes(p.id));
  if(!mine.length){
    view.innerHTML='<div class="empty"><b>Your garden is empty.</b><br>Add what you\'re growing and today\'s tasks appear here.<br><button class="go" onclick="S.tab=\'plants\';render()">Choose plants</button></div>';return}
  const tasks=tasksFor(mine,f,TODAY);
  const open=tasks.filter(t=>(t.status==='active'||t.status==='last_call')&&!actState(t.id));
  const soon=tasks.filter(t=>t.status==='upcoming'&&!actState(t.id));
  const doneOrSkipped=tasks.filter(t=>actState(t.id));
  const passed=tasks.filter(t=>t.status==='passed'&&!actState(t.id));
  let html='';
  const grp=(title,dot,items,f)=>{if(!items.length)return'';
    return '<div class="group"><div class="group-h"><span class="dot" style="background:'+dot+'"></span><h2>'+title+'</h2><span class="ct">'+items.length+'</span></div>'+items.map(f).join('')+'</div>'}
  const openCard=t=>'<div class="card '+t.status+'"><div class="row1"><div><div class="pname">'+esc(t.plantName)+'</div><div class="pmeta">'+esc(t.action)+'</div></div>'+
    '<div class="status '+t.status+'">'+(t.status==='last_call'?'Last call':'Do now')+'</div></div>'+
    '<div class="action">'+esc(t.action)+' <span class="win">· until ~'+fmt(t.end)+'</span></div>'+
    '<div class="btns"><button class="btn log" onclick="setAct(\''+t.id+'\',\'logged\')">Log ✓</button><button class="btn" onclick="setAct(\''+t.id+'\',\'skipped\')">Skip</button></div></div>';
  const soonCard=t=>'<div class="card upcoming"><div class="row1"><div><div class="pname">'+esc(t.plantName)+'</div><div class="pmeta">'+esc(t.action)+'</div></div>'+
    '<div class="status upcoming">opens ~'+fmt(t.start)+'</div></div></div>';
  const doneCard=t=>{const st=actState(t.id);
    return '<div class="card done"><div class="row1"><div><div class="pname">'+esc(t.plantName)+'</div><div class="pmeta">'+esc(t.action)+'</div></div>'+
    '<div class="status '+(st==='logged'?'done':'skipped')+'">'+(st==='logged'?'Logged ✓':'Skipped')+'</div></div>'+
    '<button class="undo" onclick="setAct(\''+t.id+'\',null)">undo</button></div>'};
  const passCard=t=>'<div class="card passed"><div class="row1"><div><div class="pname">'+esc(t.plantName)+'</div><div class="pmeta">'+esc(t.action)+'</div></div>'+
    '<div class="status passed">window was '+fmt(t.start)+'–'+fmt(t.end)+'</div></div></div>';
  html+=grp('Do this now','var(--now-fg)',open,openCard);
  if(!open.length)html+='<div class="empty"><b>Nothing urgent today.</b><br>Your garden is on schedule.</div>';
  html+=grp('Coming up','var(--soon-fg)',soon,soonCard);
  html+=grp('Done & skipped','var(--leaf-bright)',doneOrSkipped,doneCard);
  html+=grp('Passed this season','var(--closed-fg)',passed,passCard);
  view.innerHTML=html;
}

function cellRing(key){
  const plantId=S.map[key];if(!plantId)return'';
  const plant=getPlant(plantId);const [r,c]=key.split('-').map(Number);
  const nbrs=[[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
  let bad=false,good=false;
  nbrs.forEach(([nr,nc])=>{
    const nId=S.map[nr+'-'+nc];if(!nId)return;
    const nPlant=getPlant(nId);
    if(plant.antagonists.includes(nId)||nPlant.antagonists.includes(plantId))bad=true;
    else if(plant.companions.includes(nId)||nPlant.companions.includes(plantId))good=true;
  });
  return bad?'bad':(good?'good':'');
}
function cellTap(key){
  if(S.map[key]){S.cellMenu=key;S.picker=null}
  else{if(!S.garden.length)return;S.picker=key;S.cellMenu=null}
  render();
}
function pickPlant(id){if(S.picker){S.map[S.picker]=id;S.picker=null;render()}}
function cancelPicker(){S.picker=null;render()}
function viewFromMap(){const id=S.map[S.cellMenu];S.cellMenu=null;S.detail=id;render()}
function removeFromMap(){delete S.map[S.cellMenu];S.cellMenu=null;render()}
function cancelCellMenu(){S.cellMenu=null;render()}
function adjustRows(d){const nr=S.mapRows+d;if(nr<2||nr>8)return;
  if(d<0)for(let c=0;c<S.mapCols;c++)delete S.map[(S.mapRows-1)+'-'+c];
  S.mapRows=nr;S.picker=null;S.cellMenu=null;render()}
function adjustCols(d){const nc=S.mapCols+d;if(nc<2||nc>8)return;
  if(d<0)for(let r=0;r<S.mapRows;r++)delete S.map[r+'-'+(S.mapCols-1)];
  S.mapCols=nc;S.picker=null;S.cellMenu=null;render()}

function renderMap(f){
  if(!S.garden.length){
    view.innerHTML='<div class="empty"><b>Add plants to your garden first.</b><br>Once you have plants, place them on your map.<br><button class="go" onclick="S.tab=\'plants\';render()">Choose plants</button></div>';return}
  let cells='';
  for(let r=0;r<S.mapRows;r++)for(let c=0;c<S.mapCols;c++){
    const key=r+'-'+c;const plantId=S.map[key];
    if(plantId){const p=getPlant(plantId);
      cells+='<button class="cell filled '+cellRing(key)+'" onclick="cellTap(\''+key+'\')">'+esc(p.name)+'</button>';
    }else{
      cells+='<button class="cell empty" onclick="cellTap(\''+key+'\')">+</button>';
    }
  }
  let html='<div class="mapctrls">'+
    '<div class="stepper">Rows <button onclick="adjustRows(-1)">−</button><span>'+S.mapRows+'</span><button onclick="adjustRows(1)">+</button></div>'+
    '<div class="stepper">Columns <button onclick="adjustCols(-1)">−</button><span>'+S.mapCols+'</span><button onclick="adjustCols(1)">+</button></div>'+
    '</div>'+
    '<div class="gridwrap"><div class="gridgrid" style="grid-template-columns:repeat('+S.mapCols+',1fr)">'+cells+'</div>'+
    '<div class="legend"><span><span class="sw" style="background:var(--now-bg);border:1px solid var(--now-fg)"></span>good neighbors</span><span><span class="sw" style="background:#f7ded1;border:1px solid #b0552a"></span>bad neighbors</span></div></div>';

  if(S.picker){
    const chips=S.garden.map(id=>{const p=getPlant(id);return '<button class="chip" onclick="pickPlant(\''+id+'\')">'+esc(p.name)+'</button>'}).join('');
    html+='<div class="panel"><div class="lab">Place which plant?</div><div class="chips">'+chips+'<button class="chip" onclick="cancelPicker()">Cancel</button></div></div>';
  }
  if(S.cellMenu){
    const p=getPlant(S.map[S.cellMenu]);
    html+='<div class="panel"><div class="pname">'+esc(p.name)+'</div><div class="rowbtns">'+
      '<button class="btn" onclick="viewFromMap()">View detail</button>'+
      '<button class="btn" onclick="removeFromMap()">Remove</button>'+
      '<button class="btn" onclick="cancelCellMenu()">Cancel</button></div></div>';
  }
  view.innerHTML=html;
}

function renderPlants(f){
  const html=PLANTS.map(p=>{
    const inG=S.garden.includes(p.id);
    const w=windowsFor(p,f).map(win=>({...win,st:classifyWindow(win,TODAY)}));
    const best=w.find(x=>x.st==='active'||x.st==='last_call')||w.find(x=>x.st==='upcoming')||w[w.length-1];
    const stLabel={active:'in season now',last_call:'last call',upcoming:'opens ~'+fmt(best.start),passed:'season passed'}[best.st];
    return '<div class="card '+best.st+'"><div class="row1">'+
      '<div><a class="pname link" href="#" onclick="S.detail=\''+p.id+'\';render();return false">'+esc(p.name)+'</a>'+
      '<div class="pmeta">'+esc(p.cat)+' · '+esc(p.diff)+' · '+stLabel+'</div></div>'+
      '<button class="addbtn'+(inG?' in':'')+'" onclick="toggleGarden(\''+p.id+'\')">'+(inG?'In garden ✓':'+ Add')+'</button></div></div>'}).join('');
  view.innerHTML='<div class="group"><div class="group-h"><h2>Plant library</h2><span class="ct">'+PLANTS.length+' verified</span></div>'+html+'</div>';
}
function toggleGarden(id){const i=S.garden.indexOf(id);if(i>=0)S.garden.splice(i,1);else S.garden.push(id);render()}

function renderDetail(){
  const p=PLANTS.find(x=>x.id===S.detail);if(!p){S.detail=null;return render()}
  const f=frost();
  const wins=windowsFor(p,f).map(w=>({...w,st:classifyWindow(w,TODAY)}));
  const stTxt={active:'open now',last_call:'last call',upcoming:'upcoming',passed:'passed'};
  const stCol={active:'var(--now-fg)',last_call:'var(--last-fg)',upcoming:'var(--soon-fg)',passed:'var(--closed-fg)'};
  const inG=S.garden.includes(p.id);
  view.innerHTML='<button class="back" onclick="S.detail=null;render()">← back</button>'+
   '<div class="detail"><h2>'+esc(p.name)+'</h2><div class="latin">'+esc(p.latin)+'</div>'+
   '<div class="facts"><span class="fact">'+esc(p.cat)+'</span><span class="fact">'+esc(p.diff)+'</span><span class="fact">'+esc(p.sun)+'</span><span class="fact">'+esc(p.water)+'</span><span class="fact">'+esc(p.frost)+'</span><span class="fact">'+esc(p.harvest)+' to harvest</span><span class="fact">'+esc(p.spacing)+' spacing</span></div>'+
   '<div class="dsec"><div class="lab">Your windows ('+(S.frostCustom?'custom':esc((PRESETS.find(x=>x.key===S.frostKey)||{}).label))+')</div>'+
     wins.map(w=>'<div class="winrow"><span>'+esc(w.action)+'</span><span>'+fmt(w.start)+' – '+fmt(w.end)+' <span class="st" style="color:'+stCol[w.st]+'">'+stTxt[w.st]+'</span></span></div>').join('')+'</div>'+
   '<div class="dsec"><div class="lab">Feeding</div><p>'+esc(p.feed)+'</p></div>'+
   '<div class="dsec"><div class="lab">Grows well with / keep away from</div><p class="mates"><span class="good">✓ '+esc(p.companions.join(', '))+'</span><br><span class="bad">✕ '+esc(p.antagonists.join(', '))+'</span></p></div>'+
   '<div class="dsec"><div class="lab">Tips</div><ul>'+p.tips.map(t=>'<li>'+esc(t)+'</li>').join('')+'</ul></div>'+
   '<div class="dsec"><div class="lab">Common mistakes</div><ul>'+p.mistakes.map(t=>'<li class="warn">'+esc(t)+'</li>').join('')+'</ul></div>'+
   '<div class="btns" style="margin-top:18px"><button class="btn'+(inG?'':' log')+'" onclick="toggleGarden(\''+p.id+'\')">'+(inG?'Remove from my garden':'+ Add to my garden')+'</button></div></div>';
}

function renderSetup(){
  const chips=PRESETS.map(p=>'<button class="chip'+(!S.frostCustom&&S.frostKey===p.key?' on':'')+'" onclick="S.frostKey=\''+p.key+'\';S.frostCustom=null;render()">'+p.label+'</button>').join('');
  view.innerHTML='<div class="setup"><div class="lab">Where\'s your garden?</div><div class="chips">'+chips+'</div>'+
   '<div class="custom"><span>or your own last-frost date:</span><input type="date" id="cd" value="'+(S.frostCustom||'')+'"></div></div>'+
   '<div class="setup" style="margin-top:12px"><div class="lab">How this works</div>'+
   '<p style="font-size:14px;color:var(--soft)">Every plant\'s timing is stored as weeks relative to your last frost. Change the frost date and every window on every screen recomputes instantly — the same plant knowledge is correct anywhere on Earth.</p></div>';
  document.getElementById('cd').addEventListener('change',e=>{if(e.target.value){S.frostCustom=e.target.value;render()}});
}

document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;S.detail=null;render()});
render();
</script>
</body>
</html>
